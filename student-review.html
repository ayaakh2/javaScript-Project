<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Answers · Exam Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alata&family=Jersey+10&family=Jersey+25&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="student-review.css">
</head>

<body>

  <div class="app">

    <!--   Sidebar   -->
    <div class="sidebar__backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">Exam Tracker</div>

      <nav class="sidebar__nav">
        <a class="nav-link" href="student-dashboard.html"><i class="bi bi-bar-chart-fill"></i> Dashboard</a>
        <a class="nav-link" href="student-available-exam.html"><i class="bi bi-journal-text"></i> Exams</a>
        <a class="nav-link is-active" href="student-history.html"><i class="bi bi-clock-history"></i> Grades &amp;
          History</a>
        <a class="nav-link" href="student-profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>

      <div class="sidebar__foot">
        <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </div>
    </aside>

    <!--   Main   -->
    <main class="main">

      <header class="page-head">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="page-head__title" id="examTitle">Review Answers</h1>
            <p class="page-head__sub" id="examSub">&nbsp;</p>
          </div>
        </div>

        <div class="score-chip">
          <span class="score-chip__label">Your mark</span>
          <span class="score-chip__value" id="scoreValue">0/0</span>
        </div>
      </header>

      <div class="review-list" id="reviewList"></div>

    </main>
  </div>

  <script src="common.js"></script>
  <script src="student-review.js"></script>
</body>

</html>
