<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Grade - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 login-container">
            
            <div class="col-md-6 illustration-section d-none d-md-flex">
                <img src="Images/login.png" alt="login img" class="illustration-img" width="70%">
            </div>

            <div class="col-md-6 form-section">
                <div class="login-box">
                    
                    <div class="logo-wrapper">
                        <div class="custom-logo">
                            <img src="Images/Logo.png" alt="logo">
                        </div>
                        
                    </div>

                    <h2 class="welcome-title">Welcome Back !</h2>
                    <p class="sub-title">Please enter your information to sign in</p>

                    <form id="loginForm">
                        
                        <div class="mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Username" required autocomplete="username">
                        </div>

                        <div class="mb-3">
                            <div class="input-group">
                                <input type="password" class="form-control password-field" id="password" placeholder="Password" required autocomplete="current-password">
                                <span class="input-group-text" id="togglePassword">
                                    <i class="bi bi-eye" id="eyeIcon"></i>
                                </span>
                            </div>
                        </div>
                        <div id="wrongAlert" style="color: red;"></div>

                        <button type="submit" class="btn btn-login">Login</button>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="db.js"></script>
    <script src="common.js"></script>
    <script src="login.js"></script>
</body>
</html>
