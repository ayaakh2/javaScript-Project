<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Exam · Exam Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alata&family=Jersey+10&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="student-exam.css">
</head>

<body class="exam-body">

  <div class="exam-page">

    <!--   Topbar   -->
    <header class="exam-top">
      <h1 class="exam-top__title" id="examTitle">Exam</h1>
      <button class="btn btn--danger" id="endExamBtn">End Exam</button>
    </header>

    <!--   Exam card   -->
    <section class="card exam-shell">

      <!-- Question bubbles -->
      <nav class="bubbles" id="bubbles" aria-label="Question navigation"></nav>

      <hr class="exam-shell__rule">

      <div class="row g-4 align-items-start">
        <!-- Question -->
        <div class="col-12 col-lg-7">
          <h2 class="question__heading" id="questionHeading">Question 1</h2>
          <p class="question__text" id="questionText"></p>
          <p class="question__hint u-hidden" id="questionHint">Select all that apply</p>
        </div>

        <!-- Options -->
        <div class="col-12 col-lg-5">
          <div class="options" id="options"></div>
        </div>
      </div>

    </section>

    <!--   Footer nav   -->
    <footer class="exam-foot">
      <button class="btn btn--ghost" id="prevBtn">Previous</button>
      <button class="btn btn--primary" id="nextBtn">Next</button>
    </footer>

  </div>

  <script src="../common.js"></script>
  <script src="student-exam.js"></script>
</body>

</html>
