<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile · Exam Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+25&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="student-profile.css">
</head>

<body>

  <div class="app">

    <!--   Sidebar   -->
    <div class="sidebar__backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">Exam Tracker</div>

      <nav class="sidebar__nav">
        <a class="nav-link" href="student-dashboard.html"><i class="bi bi-bar-chart-fill"></i> Dashboard</a>
        <a class="nav-link" href="student-available-exam.html"><i class="bi bi-journal-text"></i> Exams</a>
        <a class="nav-link" href="student-history.html"><i class="bi bi-clock-history"></i> Grades &amp; History</a>
        <a class="nav-link is-active" href="student-profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>

      <div class="sidebar__foot">
        <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </div>
    </aside>

    <!--   Main   -->
    <main class="main profile-main">

      <!-- decorative corner: clipped by .profile-main's overflow:hidden -->
      <div class="decor" aria-hidden="true">
        <span class="decor__rect decor__rect--top"></span>
        <span class="decor__rect decor__rect--bottom"></span>
      </div>

      <div class="d-flex align-items-center gap-2 mb-2">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu">
          <i class="bi bi-list"></i>
        </button>
      </div>

      <div class="profile-stage">

        <!--   Card   -->
        <section class="card profile-card">

          <div class="avatar">
            <!-- ---- male avatar ---- -->
            <svg class="avatar__svg u-hidden" id="avatarMale" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
              role="img" aria-label="Profile picture">
              <defs>
                <clipPath id="avatarClipM">
                  <circle cx="50" cy="50" r="50" />
                </clipPath>
              </defs>
              <g clip-path="url(#avatarClipM)">
                <circle cx="50" cy="50" r="50" fill="#DCE9F2" />
                <path d="M16 100 q5 -30 34 -30 q29 0 34 30 z" fill="#FFBA42" />
                <rect x="44" y="56" width="12" height="16" rx="5" fill="#E39C82" />
                <circle cx="50" cy="44" r="17" fill="#F0B49E" />
                <path d="M33 44 a17 17 0 0 1 34 0 q-5 -9 -17 -7 q-12 2 -17 7 z" fill="#2C2438" />
                <path d="M31 40 q6 -18 24 -16 q14 2 14 12 q-8 -8 -22 -5 q-11 2 -16 9 z" fill="#2C2438" />
              </g>
            </svg>

            <!-- ---- female avatar ---- -->
            <svg class="avatar__svg u-hidden" id="avatarFemale" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
              role="img" aria-label="Profile picture">
              <defs>
                <clipPath id="avatarClipF">
                  <circle cx="50" cy="50" r="50" />
                </clipPath>
              </defs>
              <g clip-path="url(#avatarClipF)">
                <circle cx="50" cy="50" r="50" fill="#DCE9F2" />
                <!-- hair behind -->
                <path d="M28 48 a22 22 0 0 1 44 0 l3 42 q-12 -8 -25 -8 q-13 0 -25 8 z" fill="#2C2438" />
                <path d="M18 100 q5 -30 32 -30 q27 0 32 30 z" fill="#FFBA42" />
                <rect x="44" y="56" width="12" height="16" rx="5" fill="#E39C82" />
                <circle cx="50" cy="44" r="17" fill="#F0B49E" />
                <!-- fringe -->
                <path d="M33 44 a17 17 0 0 1 34 0 q-4 -11 -17 -9 q-13 2 -17 9 z" fill="#2C2438" />
                <path d="M31 44 q-3 -22 19 -22 q22 0 20 22 q-4 -14 -20 -14 q-16 0 -19 14 z" fill="#2C2438" />
              </g>
            </svg>
          </div>

          <p class="profile-name" id="profileName">&nbsp;</p>
          <p class="profile-role">Student</p>

          <div class="fields">
            <div class="field">
              <p class="field__label">Username</p>
              <p class="field__value" id="fieldUsername">—</p>
            </div>
            <div class="field">
              <p class="field__label">Phone</p>
              <p class="field__value" id="fieldPhone">—</p>
            </div>
            <div class="field">
              <p class="field__label">Gender</p>
              <p class="field__value" id="fieldGender">—</p>
            </div>
            <div class="field">
              <p class="field__label">National ID</p>
              <p class="field__value" id="fieldNationalId">—</p>
            </div>
          </div>

        </section>

        <!--   Side illustration   -->
        <div class="profile-art">

          <!-- ---- male: browser window + standing figure ---- -->
          <div class="art u-hidden" id="artMale">
            <img class="art__object" src="Images/browser.png" alt="Broswer Img">
            <img class="art__figure" src="Images/man.png" alt="Man Img">
          </div>

          <!-- ---- female: phone + walking figure ---- -->
          <div class="art u-hidden" id="artFemale">
            <img class="art__object" src="Images/phone.png" alt="Phone Img">
            <img class="art__figure" src="Images/woman.png" alt="Woman Img">
          </div>

        </div>

      </div>
    </main>
  </div>

  <script src="common.js"></script>
  <script src="student-profile.js"></script>
</body>

</html>
