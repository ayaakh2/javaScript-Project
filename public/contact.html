<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Grade - Contact Us</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Jersey 10) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
    
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <img src="Images/Logo.png" alt="Logo" height="40">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact us</a></li>
                </ul>
            </div>
            <div class="d-flex gap-2">
                <a href="Login.html" class="btn btn-nav-login" id="loginBtn">Login</a>
            </div>
        </div>
    </nav>

    <!-- HEADER TITLE -->
    <div class="header-section container">
        <h1 class="page-title">Contact us</h1>
    </div>

    <!-- WAVE EFFECT -->
    <div class="wave-top-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" preserveAspectRatio="none" style="position: absolute; bottom: -1px; left: 0; width: 100%; height: 120px; pointer-events: none; shape-rendering: geometricPrecision;">
            <path fill="#e1eff6" d="M0,96 C360,12 840,12 1440,96 L1440,120 L0,120 Z"></path>
        </svg>
    </div>

    <!-- CONTENT GRID SECTION -->
    <section class="content-section">
        <div class="container">
            <div class="row g-5">
                
                <!-- LEFT COLUMN: INFO -->
                <div class="col-md-6">
                    <h2 class="content-title">Need more information?</h2>
                    <p class="content-text">Get in touch with us</p>
                    
                    <div class="contact-method">
                        <div class="icon-box"><i class="bi bi-telephone-fill"></i></div>
                        <div class="method-details">
                            <text>+962770000000</text>
                        </div>
                    </div>
                    
                    <div class="contact-method">
                        <div class="icon-box"><i class="bi bi-envelope-fill"></i></div>
                        <div class="method-details">
                            <text>codegrade@job.com</text>
                        </div>
                    </div>
                </div>

                <!-- RIGHT COLUMN: CONTACT FORM -->
                <div class="col-md-6">
                    <h2 class="form-title">Send Message</h2>
                    <p class="content-text">Please fill out the form below with your details and message to contact us</p>
                    
                    <form class="contact-form" id="contactForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <input type="text" id="firstName" placeholder="First name" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" id="lastName" placeholder="Last name" required>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <input type="text" id="emailOrPhone" placeholder="Email or phone" required>
                        </div>
                        
                        <div class="mb-4">
                            <textarea id="message" placeholder="Write your message here..." required></textarea>
                        </div>
                        
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        &copy; 2026 Code Grade. All rights reserved.
    </footer>

    
</html>
