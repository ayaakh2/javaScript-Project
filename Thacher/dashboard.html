<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · Exam Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+25&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>

  <div class="app">

    <!--   Sidebar   -->
    <div class="sidebar__backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">Exam Tracker</div>

      <nav class="sidebar__nav">
        <a class="nav-link is-active" href="dashboard.html"><i class="bi bi-bar-chart-fill"></i> Dashboard</a>
        <a class="nav-link" href="student.html"><i class="bi bi-people-fill"></i></i> Students</a>
        <a class="nav-link" href="exam.html"><i class="bi bi-journal-text"></i> Exams</a>
        <a class="nav-link" href="results.html"><i class="bi bi-clock-history"></i> History</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>

      <div class="sidebar__foot">
        <a class="nav-link" href="../Login.html" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </div>
    </aside>

    <!--   Main   -->
    <main class="main">

      <header class="topbar">
        <div class="d-flex align-items-center gap-2">
          <button class="sidebar-toggle" id="sidebarToggle" aria-label="Open menu">
            <i class="bi bi-list"></i>
          </button>
          <div>
            <p class="topbar__greeting" id="greeting">Welcome back,</p>
            <p class="topbar__sub">Here is what's happening with your academy today</p>
          </div>
        </div>

      </header>

      <!--   Stats   -->
      <section class="row g-3 stats" aria-label="Your progress">
        <div class="col-12 col-md-4">
          <article class="card stat">
            <span class="stat__icon"><i class="bi bi-trophy-fill"></i></span>
            <div class="stat__body">
              <p class="stat__value" id="Total_Students">0</p>
              <p class="stat__label">Total Students</p>
            </div>
          </article>
        </div>

        <div class="col-12 col-md-4">
          <article class="card stat">
            <span class="stat__icon"><i class="bi bi-star-fill"></i></span>
            <div class="stat__body">
              <p class="stat__value" id="Active_Exams">0</p>
              <p class="stat__label">Active Exams</p>
            </div>
          </article>
        </div>

        <div class="col-12 col-md-4">
          <article class="card stat">
            <span class="stat__icon"><i class="bi bi-hourglass-split"></i></span>
            <div class="stat__body">
              <p class="stat__value" id="Inactive_Exams">0</p>
              <p class="stat__label">Inactive Exams</p>
            </div>
          </article>
        </div>
      </section>

      <!--   Exams Overview   -->
      <section class="Exams" aria-label="Exams Overview">
        <h2 class="section-title">Exams Overview</h2>
        <div class="row g-3 Exams_table" id="examGrid"></div>
      </section>

    </main>
  </div>

  
  <script src="dashboard.js"></script>
</body>

</html>
