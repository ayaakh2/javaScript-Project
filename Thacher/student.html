<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student_Administration</title>
    <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+25&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="Student.css">
</head>
<body>
    <div class="app">

    <!--   Sidebar   -->
    <div class="sidebar__backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">Exam Tracker</div>

      <nav class="sidebar__nav">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart-fill"></i> Dashboard</a>
        <a class="nav-link is-active" href="student.html"><i class="bi bi-people-fill"></i></i> Students</a>
        <a class="nav-link" href="exam.html"><i class="bi bi-journal-text"></i> Exams</a>
        <a class="nav-link" href="results.html"><i class="bi bi-clock-history"></i> History</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>

      <div class="sidebar__foot">
        <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </div>
    </aside>

    <!--   Main   -->
    <main class="main">
    
    <section class="d-flex justify-content-between align-items-center">
        
    <div id="search" class="input-group mb-3">
    <input id="search_name" type="text" placeholder="Search.." class="search_name">
    <div id="search_btn"><i class="bi bi-search "></i></div>
    </div>
    <div>
        <button class="btn bag-primary white bt-primary" type="button" data-bs-toggle="modal" data-bs-target="#myModal" id="add"><i class="bi bi-plus-lg"></i>Add New Student</button>
    </div>
    
    </section>
    <div id="show" class="student_table"></div>
    <div id="show_results" class="student_table"></div>
   
    </main>
  </div>
    
<div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="myModalLabel">Edit Info</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        
        <form>
            <label>Full Name</label>
            <input id="Full_Name" type="text" class="form-field">
            <label>username</label>
            <input id="username" type="text" class="form-field">
            <label>password</label>
            <input id="password" type="password" class="form-field">
            <label>phone</label>
            <input id="phone" type="text" class="form-field">
            <div class="radio-group">
            <div class="radio-option">
            <label>male</label>
            <input id="male" type="radio" name="Gender">
            </div>
            <div class="radio-option">
            <label>female</label>
            <input id="female" type="radio" name="Gender">
            </div>
            </div>
            <label>national ID</label>
            <input id="nationalId" type="text" class="form-field ">
            
            <input id="submit" type="button" value="Add Student" class="btn--primary btn">
            <input id="edit" type="button" value="Edit Student" style="display: none;" class="btn--primary btn">
        </form>
    
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="answer" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="myModalLabel">Answers</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body student_table" id="show_answer">
      </div>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="student.js"></script>
</body>
</html>
