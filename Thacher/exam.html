<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Jersey+25&display=swap" rel="stylesheet">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="exam.css">
    <link rel="stylesheet" href="Student.css">
</head>
<body>
    <div class="app">

    <!--   Sidebar   -->
    <div class="sidebar__backdrop" id="sidebarBackdrop"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">Exam Tracker</div>

      <nav class="sidebar__nav">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-bar-chart-fill"></i> Dashboard</a>
        <a class="nav-link" href="student.html"><i class="bi bi-people-fill"></i></i> Students</a>
        <a class="nav-link is-active" href="exam.html"><i class="bi bi-journal-text"></i> Exams</a>
        <a class="nav-link" href="results.html"><i class="bi bi-clock-history"></i> History</a>
        <a class="nav-link" href="profile.html"><i class="bi bi-person-circle"></i> Profile</a>
      </nav>

      <div class="sidebar__foot">
        <a class="nav-link" href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a>
      </div>
    </aside>

    <!--   Main   -->
    <main class="main">

      <section class="d-flex justify-content-between align-items-center">
        
    <div id="search" class="input-group mb-3">
    <input id="search_name" type="text" placeholder="Search.." class="search_name">
    <div id="search_btn"><i class="bi bi-search "></i></div>
    </div>
    <div id="add">
        <button class="btn bag-primary white bt-primary" type="button" data-bs-toggle="modal" data-bs-target="#myModal" ><i class="bi bi-plus-lg"></i>Add New Exam</button>
    </div>
    
    </section>
<div id="exams" class="student_table"></div>
    
    </main>
  </div>
 </div>
 
 <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="myModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="myModalLabel">Add Exam</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        
        <div class="add_exam">
        <form id="exam">
            <div>
            <label>title</label>
            <input id="title" class="form-field" type="text">
            </div>
            
            <div>
            <label>date</label>
            <input id="date" class="form-field" type="date">
            </div>
            
            <div>
            <label>time</label>
            <input id="time" class="form-field" type="time">
            </div>

            <input id="add_exam" type="button" value="Add Exam" class="btn--primary btn">
            <input id="edit_exam" type="button" value="Edit Exam" class="btn--primary btn">
            <input id="add_new_question" type="button" value="Add New Question" class="btn--accent btn">
            
        </form>
        <form id="questions">
          <hr>
            <div>
            <label>type</label>
            <select id="type" class="form-field">
                <option value="MCQ" >MCQ</option>
                <option value="Short_Answer">Short Answer</option>
                <option value="true/false">true/false</option>
                <option value="Multiple">Multiple answers</option>
            </select>
            </div>

            <div>
            <label>questionText</label>
            <input id="questionText" class="form-field" type="text" required>
            </div>
        
            <div>
            <label>options <small>Use , to separate</small></label>
            <input id="options" class="form-field" type="text">
            </div>
        
            <div>
            <label>correctAnswer<small>Use , to separate</small></label>
            <input id="correctAnswer" class="form-field" type="text">
            </div>

            <input id="add_questions" class="btn--primary btn" type="button" value="add questions">
            <input id="edit_question" class="btn--primary btn" type="button" value="Edit questions" style="display: none;">
<hr>
          </form>

        <div id="All_questions" class="student_table">
              <table>
                <tr>
                      <th>#</th>
                    <th>type</th>
                    <th>question Text</th>
                    <th>options</th>
                    <th>correct Answer</th>
                </tr>
              </table>
            </div>
            
    </div>
    
      </div>
    </div>
  </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="exam.js"></script>
</body>
</html>
